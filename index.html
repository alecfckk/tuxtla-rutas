<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TuxtlaRutas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root{
  --bg:#e4eaf0;
  --g2:rgba(255,255,255,0.90);
  --g3:rgba(255,255,255,0.98);
  --gb:rgba(255,255,255,0.95);
  --sh:rgba(0,0,0,0.09);
  --sh2:rgba(0,0,0,0.16);
  --text:#18202e;
  --sub:#7a8899;
  --accent:#1db896;
  --acb:#0ea5e9;
  --danger:#f43f5e;
  --font:'Outfit',sans-serif;
  --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}
button{font-family:var(--font);cursor:pointer;border:none}
input{font-family:var(--font)}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;
  background:var(--bg);overflow:hidden}
.screen.active{display:flex}

/* ═══════════════════════════════════════════
   ── SPLASH SCREEN ──
═══════════════════════════════════════════ */
#s-splash{
  align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0d1f2d 0%,#0a3d32 60%,#0c2a3a 100%);
}
.splash-glow{
  position:absolute;width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(29,184,150,0.25) 0%,transparent 70%);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
.splash-logo{
  position:relative;z-index:2;
  width:88px;height:88px;border-radius:26px;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  display:flex;align-items:center;justify-content:center;font-size:42px;
  box-shadow:0 12px 40px rgba(29,184,150,0.5),0 0 0 1px rgba(255,255,255,0.1);
  animation:splash-in .8s cubic-bezier(.34,1.56,.64,1) both;
  margin-bottom:24px;
}
.splash-title{
  position:relative;z-index:2;
  font-size:2.4rem;font-weight:800;color:#fff;letter-spacing:-.03em;
  animation:splash-in .8s .15s cubic-bezier(.34,1.56,.64,1) both;
  margin-bottom:8px;
}
.splash-title span{color:var(--accent)}
.splash-sub{
  position:relative;z-index:2;
  font-size:.82rem;color:rgba(255,255,255,0.5);font-weight:400;
  animation:splash-in .8s .25s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splash-in{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   ── LOGIN / REGISTER SCREEN ──
═══════════════════════════════════════════ */
#s-auth{
  align-items:center;justify-content:flex-end;
  background:linear-gradient(160deg,#0d1f2d 0%,#0a3d32 60%,#0c2a3a 100%);
}
.auth-bg-bus{
  position:absolute;top:10%;right:-30px;font-size:120px;opacity:0.07;
  transform:rotate(-15deg);pointer-events:none;
  animation:float-bus 6s ease-in-out infinite;
}
@keyframes float-bus{0%,100%{transform:rotate(-15deg) translateY(0)}50%{transform:rotate(-15deg) translateY(-20px)}}
.auth-header{
  position:absolute;top:0;left:0;right:0;
  padding:60px 32px 0;text-align:center;
}
.auth-header-logo{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.auth-header-logo span{color:var(--accent)}
.auth-header-sub{font-size:.78rem;color:rgba(255,255,255,0.45);margin-top:4px}

.auth-sheet{
  width:100%;
  background:var(--g3);
  border-radius:32px 32px 0 0;
  padding:32px 24px 40px;
  box-shadow:0 -20px 60px rgba(0,0,0,0.3);
  position:relative;z-index:2;
}
.auth-tabs{
  display:flex;background:rgba(0,0,0,0.06);border-radius:14px;padding:4px;
  margin-bottom:28px;
}
.auth-tab{
  flex:1;padding:10px;border-radius:10px;font-size:.82rem;font-weight:600;
  background:none;color:var(--sub);transition:all .2s;
}
.auth-tab.active{background:#fff;color:var(--text);box-shadow:0 2px 10px var(--sh2)}

.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:600;color:var(--sub);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field-wrap{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.05);border:1.5px solid transparent;
  border-radius:14px;padding:13px 15px;
  transition:border-color .2s,background .2s;
}
.field-wrap:focus-within{background:#fff;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(29,184,150,0.12)}
.field-wrap svg{color:var(--sub);flex-shrink:0}
.field-wrap input{
  background:none;border:none;outline:none;
  font-size:.9rem;color:var(--text);width:100%;font-weight:500;
}
.field-wrap input::placeholder{color:var(--sub);font-weight:400}

.auth-btn{
  width:100%;padding:15px;border-radius:16px;font-size:.95rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  color:#fff;box-shadow:0 6px 24px rgba(29,184,150,0.4);
  transition:all .2s;margin-top:8px;
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(29,184,150,0.5)}
.auth-btn:active{transform:translateY(0) scale(.98)}

.auth-divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
  font-size:.72rem;color:var(--sub);font-weight:500;
}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(0,0,0,0.08)}

.auth-guest{
  width:100%;padding:14px;border-radius:16px;font-size:.88rem;font-weight:600;
  background:rgba(0,0,0,0.05);color:var(--sub);
  border:1.5px solid rgba(0,0,0,0.08);transition:all .2s;
}
.auth-guest:hover{background:rgba(0,0,0,0.08);color:var(--text)}

.auth-error{
  background:rgba(244,63,94,0.1);border:1.5px solid rgba(244,63,94,0.3);
  border-radius:12px;padding:10px 14px;font-size:.75rem;color:var(--danger);
  font-weight:500;margin-bottom:14px;display:none;
}
.auth-error.show{display:block}

/* ═══════════════════════════════════════════
   ── MAIN APP ──
═══════════════════════════════════════════ */
#s-app{background:transparent}

/* MAP */
#map{position:fixed;inset:0;z-index:0}

/* TOP BAR */
#topbar{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:500;
  background:var(--g2);backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1.5px solid var(--gb);border-radius:22px;
  box-shadow:0 8px 32px var(--sh2),0 1px 0 rgba(255,255,255,0.8) inset;
  padding:10px 16px;display:flex;align-items:center;gap:12px;
  min-width:300px;max-width:92vw;
}
.tb-icon{
  width:34px;height:34px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 3px 10px rgba(29,184,150,0.35);
}
.tb-title{font-size:.92rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
.tb-title span{color:var(--accent)}
.tb-sub{font-size:.58rem;color:var(--sub);margin-top:1px}
.tb-div{width:1px;height:26px;background:rgba(0,0,0,0.08);flex-shrink:0}
.tb-stat{text-align:center;min-width:36px}
.tb-n{font-size:1rem;font-weight:800;color:var(--accent);line-height:1}
.tb-l{font-size:.52rem;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.tb-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;
  box-shadow:0 2px 8px rgba(29,184,150,0.35);
  border:2px solid #fff;
  margin-left:auto;
}

/* SEARCH */
#searchbar{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:500;width:340px;max-width:92vw;
}
.si{
  background:var(--g2);backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1.5px solid var(--gb);border-radius:16px;
  box-shadow:0 5px 20px var(--sh);
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  transition:box-shadow .2s,border-color .2s;
}
.si:focus-within{border-color:var(--accent);box-shadow:0 5px 20px var(--sh),0 0 0 3px rgba(29,184,150,0.12)}
.si svg{color:var(--sub);flex-shrink:0}
.si input{background:none;border:none;outline:none;font-family:var(--font);font-size:.82rem;color:var(--text);width:100%;font-weight:500}
.si input::placeholder{color:var(--sub);font-weight:400}
#sc{background:rgba(0,0,0,0.07);border:none;border-radius:6px;width:20px;height:20px;
  align-items:center;justify-content:center;font-size:10px;color:var(--sub);
  flex-shrink:0;display:none;transition:background .15s}
#sc.show{display:flex}
#sc:hover{background:rgba(0,0,0,0.12)}

/* GPS / RIDING BANNER */
#gps-banner{
  position:fixed;top:148px;left:50%;transform:translateX(-50%);z-index:500;
  background:linear-gradient(135deg,rgba(29,184,150,0.95),rgba(14,165,233,0.95));
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,0.3);border-radius:16px;
  box-shadow:0 6px 24px rgba(29,184,150,0.4);
  padding:10px 16px;display:none;align-items:center;gap:10px;
  min-width:280px;max-width:92vw;
}
#gps-banner.show{display:flex}
.gps-bus-anim{font-size:22px;animation:drive 1s linear infinite}
@keyframes drive{0%{transform:translateX(-3px)}50%{transform:translateX(3px)}100%{transform:translateX(-3px)}}
.gps-info{flex:1}
.gps-route-lbl{font-size:.65rem;font-weight:600;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:.06em}
.gps-route-name{font-size:.88rem;font-weight:700;color:#fff}
.gps-speed{font-size:.68rem;color:rgba(255,255,255,0.8);margin-top:1px}
.gps-stop-btn{
  background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.4);
  border-radius:10px;padding:6px 12px;font-size:.72rem;font-weight:700;color:#fff;
  transition:all .18s;
}
.gps-stop-btn:hover{background:rgba(255,255,255,0.35)}

/* BOTTOM PANEL */
#panel{position:fixed;bottom:0;left:0;right:0;z-index:500;pointer-events:none}

/* Filter pills */
#pills{
  display:flex;gap:8px;padding:0 16px 10px;
  overflow-x:auto;scrollbar-width:none;pointer-events:all;
}
#pills::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:7px 16px;border-radius:20px;
  background:var(--g2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid var(--gb);box-shadow:0 3px 12px var(--sh);
  font-size:.7rem;font-weight:600;color:var(--sub);transition:all .2s;white-space:nowrap;
}
.pill:hover{background:rgba(255,255,255,.98);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(29,184,150,.4)}

/* Cards strip */
#cards{
  display:flex;gap:12px;padding:0 16px 14px;
  overflow-x:auto;scrollbar-width:none;pointer-events:all;
}
#cards::-webkit-scrollbar{display:none}

.rc{
  flex-shrink:0;width:172px;
  background:var(--g2);backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1.5px solid var(--gb);border-radius:20px;
  box-shadow:0 6px 24px var(--sh),0 1px 0 rgba(255,255,255,.8) inset;
  padding:14px;cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .2s;
  position:relative;overflow:hidden;
}
.rc::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,.55),transparent);pointer-events:none}
.rc:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 14px 40px var(--sh2)}
.rc.active{border-color:var(--rc);background:rgba(255,255,255,.95);
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 16px 48px var(--sh2),0 0 0 2px color-mix(in srgb,var(--rc) 25%,transparent)}
.rc.hidden{display:none}

.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rc-num{width:38px;height:38px;border-radius:12px;background:var(--rc);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.88rem;color:#fff;
  box-shadow:0 4px 12px color-mix(in srgb,var(--rc) 50%,transparent);
  transition:transform .2s}
.rc.active .rc-num{transform:scale(1.08)}
.rc-eye{width:28px;height:28px;border-radius:9px;background:rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;color:var(--sub);
  transition:all .18s;flex-shrink:0}
.rc.active .rc-eye{background:var(--rc);color:#fff}
.rc-name{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:3px}
.rc-desc{font-size:.63rem;color:var(--sub);line-height:1.4}
.rc-meta{display:flex;align-items:center;gap:4px;margin-top:8px;
  font-size:.62rem;color:var(--sub);font-weight:500}
.rc-dot{width:6px;height:6px;border-radius:50%;background:var(--rc)}

/* BOTTOM NAV */
#bnav{
  margin:0 12px 20px;pointer-events:all;
  background:var(--g2);backdrop-filter:blur(24px) saturate(2);
  -webkit-backdrop-filter:blur(24px) saturate(2);
  border:1.5px solid var(--gb);border-radius:28px;
  box-shadow:0 8px 40px var(--sh2),0 1px 0 rgba(255,255,255,.9) inset;
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
}
.nav-grp{display:flex;align-items:center;flex:1;justify-content:space-around}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 14px;border-radius:14px;transition:all .2s;background:none;border:none}
.ni:hover{background:rgba(0,0,0,.05)}
.ni.active{background:rgba(0,0,0,.06)}
.ni-ic{font-size:19px;transition:all .2s}
.ni-lb{font-size:.58rem;color:var(--sub);font-weight:500;transition:color .2s}
.ni.active .ni-lb{color:var(--text);font-weight:700}
.nav-plus{
  width:52px;height:52px;border-radius:18px;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  box-shadow:0 6px 20px rgba(29,184,150,.45);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;
  transition:transform .2s,box-shadow .2s;flex-shrink:0;
}
.nav-plus:hover{transform:scale(1.08);box-shadow:0 8px 28px rgba(29,184,150,.55)}
.nav-plus:active{transform:scale(.96)}

/* POPUP */
#popup{
  position:fixed;bottom:0;left:0;right:0;z-index:800;
  background:var(--g3);border-radius:28px 28px 0 0;
  box-shadow:0 -20px 60px var(--sh2),0 -1px 0 rgba(255,255,255,.9);
  padding:0 24px 40px;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.32,1,.6,1);
  max-height:80vh;overflow-y:auto;
}
#popup.show{transform:translateY(0)}
#popup::-webkit-scrollbar{display:none}
.popup-handle{width:40px;height:4px;border-radius:2px;background:rgba(0,0,0,.1);
  margin:14px auto 20px}
.pp-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  border-radius:10px;font-weight:800;font-size:.78rem;color:#fff;margin-bottom:12px}
.pp-name{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.pp-via{font-size:.72rem;color:var(--sub);margin-bottom:18px;line-height:1.5}
.pp-div{height:1px;background:rgba(0,0,0,.07);margin-bottom:14px}
.pp-sec{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--sub);font-weight:600;margin-bottom:10px}
.pp-stop{display:flex;align-items:flex-start;gap:10px}
.pp-sl{display:flex;flex-direction:column;align-items:center;padding-top:3px}
.pp-dot{width:9px;height:9px;border-radius:50%;background:var(--rc);
  flex-shrink:0;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--rc)}
.pp-bar{width:2px;min-height:14px;background:linear-gradient(var(--rc),rgba(0,0,0,.06));flex:1}
.pp-stop:last-child .pp-bar{display:none}
.pp-sname{font-size:.73rem;color:var(--text);padding:1px 0 14px;font-weight:500;line-height:1.3}
.pp-sname.term{font-weight:700}
.pp-actions{display:flex;gap:8px;margin-top:18px}
.pp-btn{flex:1;padding:11px;border-radius:14px;border:1.5px solid rgba(0,0,0,.08);
  background:rgba(0,0,0,.04);font-size:.73rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.pp-btn:hover{background:rgba(0,0,0,.08)}
.pp-btn.pri{background:var(--rc);border-color:var(--rc);color:#fff;
  box-shadow:0 4px 14px color-mix(in srgb,var(--rc) 40%,transparent)}
.pp-btn.pri:hover{filter:brightness(1.08)}
.pp-close{position:absolute;top:20px;right:20px;width:30px;height:30px;
  border-radius:10px;background:rgba(0,0,0,.07);display:flex;align-items:center;
  justify-content:center;font-size:13px;color:var(--sub);transition:background .15s}
.pp-close:hover{background:rgba(0,0,0,.12)}

/* RIDE BTN inside popup */
.pp-ride{
  width:100%;padding:13px;border-radius:16px;margin-top:10px;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  color:#fff;font-size:.88rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(29,184,150,.35);transition:all .2s;
}
.pp-ride:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(29,184,150,.45)}

/* OVERLAY */
#ov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0);
  pointer-events:none;transition:background .3s}
#ov.show{background:rgba(0,0,0,.3);pointer-events:all}

/* TOAST */
#toast{position:fixed;top:auto;bottom:200px;left:50%;transform:translateX(-50%) translateY(8px);
  z-index:2000;background:var(--text);color:#fff;
  padding:9px 20px;border-radius:14px;font-size:.73rem;font-weight:500;
  opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PROFILE SHEET */
#profile-sheet{
  position:fixed;top:0;right:0;bottom:0;width:280px;z-index:900;
  background:var(--g3);box-shadow:-20px 0 60px var(--sh2);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.32,1,.6,1);
  padding:60px 24px 40px;display:flex;flex-direction:column;gap:16px;
}
#profile-sheet.show{transform:translateX(0)}
.ps-avatar{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;color:#fff;
  box-shadow:0 6px 20px rgba(29,184,150,.35);margin-bottom:4px;
}
.ps-name{font-size:1.1rem;font-weight:800;color:var(--text)}
.ps-email{font-size:.75rem;color:var(--sub);margin-bottom:8px}
.ps-div{height:1px;background:rgba(0,0,0,.07)}
.ps-btn{
  display:flex;align-items:center;gap:10px;padding:12px;
  border-radius:14px;background:rgba(0,0,0,.04);border:none;
  font-size:.82rem;font-weight:600;color:var(--text);transition:all .18s;
}
.ps-btn:hover{background:rgba(0,0,0,.08)}
.ps-btn.danger{color:var(--danger)}
.ps-close{position:absolute;top:16px;right:16px;width:30px;height:30px;

  justify-content:center;font-size:13px;color:var(--sub)}
.ps-close:hover{background:rgba(0,0,0,.12)}

/* GRID view for routes tab */
#routes-grid{
  position:fixed;inset:0;z-index:600;
  background:var(--bg);
  display:none;flex-direction:column;padding-top:14px;
  overflow-y:auto;
}
#routes-grid.show{display:flex}
.rg-header{display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:var(--g2);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,.08);}
.rg-back{width:36px;height:36px;border-radius:12px;background:rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.rg-back:hover{background:rgba(0,0,0,.1)}
.rg-title{font-size:1rem;font-weight:800}
.rg-body{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rg-card{
  background:var(--g2);border:1.5px solid var(--gb);border-radius:18px;
  padding:16px;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px var(--sh);
}
.rg-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--sh2)}
.rg-num{width:42px;height:42px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1rem;color:#fff;

.rg-name{font-size:.82rem;font-weight:700;margin-bottom:3px}
.rg-desc{font-size:.65rem;color:var(--sub);line-height:1.4}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{
  background:rgba(255,255,255,.95)!important;border:none!important;
  border-radius:16px!important;box-shadow:0 8px 32px rgba(0,0,0,.15)!important}
.leaflet-popup-tip{background:rgba(255,255,255,.95)!important}
.leaflet-popup-content{margin:12px 14px!important;font-family:var(--font)!important}
.pop-badge{display:inline-block;padding:2px 8px;border-radius:7px;

.pop-stop{font-size:.78rem;font-weight:700}
.pop-line{font-size:.64rem;color:var(--sub);margin-top:2px}
.leaflet-control-zoom a{
  background:var(--g2)!important;backdrop-filter:blur(12px)!important;
  border:1.5px solid var(--gb)!important;color:var(--text)!important;

  width:34px!important;height:34px!important;line-height:32px!important;
  margin-bottom:4px!important;
}
.leaflet-control-zoom{border:none!important}

/* BUS MARKER on map */
.bus-marker-wrap{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--acb));
  border:3px solid #fff;
  box-shadow:0 4px 16px rgba(29,184,150,.5);
  font-size:18px;
  animation:bus-pulse 2s ease-in-out infinite;
}
@keyframes bus-pulse{
  0%,100%{box-shadow:0 4px 16px rgba(29,184,150,.5),0 0 0 0 rgba(29,184,150,.3)}
  50%{box-shadow:0 4px 16px rgba(29,184,150,.5),0 0 0 10px rgba(29,184,150,0)}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:fadeUp .4s ease both}
.rc:nth-child(1){animation-delay:.04s}.rc:nth-child(2){animation-delay:.08s}
.rc:nth-child(3){animation-delay:.12s}.rc:nth-child(4){animation-delay:.16s}
.rc:nth-child(5){animation-delay:.20s}.rc:nth-child(6){animation-delay:.24s}
.rc:nth-child(7){animation-delay:.28s}.rc:nth-child(8){animation-delay:.32s}

//  SPLASH → AUTH or APP

setTimeout(()=>{
  document.getElementById('s-splash').classList.remove('active');
  const session=getSession();
  if(session){
    currentUser=session;
    startApp();
  } else {

  }
},2000);

// ══════════════════════════════════════════════════════
//  AUTH LOGIC
// ══════════════════════════════════════════════════════
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-reg').style.display=t==='reg'?'block':'none';
}

function showErr(id,msg){
  const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  if(!email||!pass){showErr('err-login','Por favor llena todos los campos');return}
  const users=getUsers();
  const u=users.find(x=>x.email===email&&x.pass===pass);
  if(!u){showErr('err-login','Correo o contraseña incorrectos');return}
  currentUser=u;saveSession(u);
  document.getElementById('s-auth').classList.remove('active');
  startApp();
}

function doRegister(){
  const name=document.getElementById('rg-name').value.trim();
  const email=document.getElementById('rg-email').value.trim();
  const pass=document.getElementById('rg-pass').value;
  if(!name||!email||!pass){showErr('err-reg','Por favor llena todos los campos');return}
  if(pass.length<6){showErr('err-reg','La contraseña debe tener al menos 6 caracteres');return}
  const users=getUsers();
  if(users.find(x=>x.email===email)){showErr('err-reg','Este correo ya está registrado');return}
  const u={name,email,pass,initials:name.slice(0,2).toUpperCase()};
  users.push(u);saveUsers(users);
  currentUser=u;saveSession(u);
  document.getElementById('s-auth').classList.remove('active');
  startApp();
}

function doGuest(){
  currentUser={name:'Invitado',email:'',initials:'?',guest:true};
  document.getElementById('s-auth').classList.remove('active');
  startApp();
}

function doLogout(){
  closeProfile();
  ridingId=null;
  if(busMarker)map.removeLayer(busMarker);
  clearInterval(rideInterval);
  clearSession();
  currentUser=null;
  // reset map layers
  Object.values(layers).forEach(l=>{
    try{map.removeLayer(l.out)}catch{}
    try{map.removeLayer(l.poly)}catch{}
    l.markers.forEach(m=>{try{map.removeLayer(m)}catch{}});
    l.visible=false;
  });
  activeCount=0;
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('active'));
  document.getElementById('gps-banner').classList.remove('show');
  document.getElementById('s-app').classList.remove('active');
  document.getElementById('s-auth').classList.add('active');
  showToast('Sesión cerrada');
}

// ══════════════════════════════════════════════════════
//  START APP
// ══════════════════════════════════════════════════════
function startApp(){
  document.getElementById('s-app').classList.add('active');
  updateAvatar();
  if(!map) initMap();
}

function updateAvatar(){
  const init=currentUser?.initials||'?';
  document.getElementById('tb-avatar').textContent=init;
  document.getElementById('ps-av').textContent=init;
  document.getElementById('ps-name').textContent=currentUser?.name||'Invitado';
  document.getElementById('ps-email').textContent=currentUser?.email||'Sin cuenta';
  document.getElementById('ps-logout').textContent=currentUser?.guest?'← Iniciar sesión':'← Cerrar sesión';
}

// ══════════════════════════════════════════════════════
//  MAP INIT
// ══════════════════════════════════════════════════════
function initMap(){
  map=L.map('map',{center:[16.7510,-93.1150],zoom:13,zoomControl:false,attributionControl:false});
  L.control.zoom({position:'topright'}).addTo(map);
  L.control.attribution({position:'bottomright',prefix:false}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd',maxZoom:20,
  }).addTo(map);
  buildLayers();
  buildCards();
  buildRoutesGrid();
  setupEvents();
}

function buildLayers(){
  ROUTES.forEach(r=>{
    const out=L.polyline(r.path,{color:'#fff',weight:10,opacity:.4,lineCap:'round',lineJoin:'round'});
    const poly=L.polyline(r.path,{color:r.color,weight:6,opacity:.93,lineCap:'round',lineJoin:'round'});
    const markers=r.stops.map((s,i)=>{
      const isE=i===0||i===r.stops.length-1;const sz=isE?18:11;
      const icon=L.divIcon({className:'',
        html:`<div style="width:${sz}px;height:${sz}px;background:${r.color};border:${isE?3:2}px solid #fff;border-radius:50%;box-shadow:0 2px ${isE?10:5}px ${r.color}88,0 1px 3px rgba(0,0,0,.2)"></div>`,
        iconAnchor:[sz/2,sz/2],iconSize:[sz,sz]});
      const m=L.marker([s.lat,s.lng],{icon});
      m.bindPopup(`<span class="pop-badge" style="background:${r.color}">Ruta ${r.num}</span><div class="pop-stop">${s.terminal?'🏁 ':'🚏 '}${s.name}</div><div class="pop-line">${r.via}</div>`,{maxWidth:220,closeButton:false});
      return m;
    });
    layers[r.id]={out,poly,markers,visible:false};
  });
}

// ══════════════════════════════════════════════════════
//  CARDS
// ══════════════════════════════════════════════════════
function buildCards(){
  const strip=document.getElementById('cards');strip.innerHTML='';
  ROUTES.forEach(r=>{
    const c=document.createElement('div');
    c.className='rc';c.id=`rc-${r.id}`;
    c.dataset.zone=r.zone;
    c.dataset.search=`${r.name} ${r.desc} ${r.stops.map(s=>s.name).join(' ')}`.toLowerCase();
    c.style.setProperty('--rc',r.color);
    c.innerHTML=`
      <div class="rc-top">
        <div class="rc-num">${r.num}</div>
        <div class="rc-eye">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
      </div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>
      <div class="rc-meta"><span class="rc-dot"></span>${r.stops.length} paradas</div>`;
    c.addEventListener('click',e=>{
      if(e.target.closest('.rc-eye')){toggleRoute(r.id);return}
      openPopup(r.id);
    });
    strip.appendChild(c);
  });
}

function buildRoutesGrid(){
  const body=document.getElementById('rg-body');body.innerHTML='';
  ROUTES.forEach(r=>{
    const c=document.createElement('div');
    c.className='rg-card';c.style.setProperty('--rc',r.color);
    c.innerHTML=`<div class="rg-num" style="background:${r.color}">${r.num}</div>
      <div class="rg-name">${r.name}</div>
      <div class="rg-desc">${r.desc}</div>`;
    c.addEventListener('click',()=>{closeRoutesGrid();openPopup(r.id)});
    body.appendChild(c);
  });
}

// ══════════════════════════════════════════════════════
//  TOGGLE ROUTE
// ══════════════════════════════════════════════════════
function toggleRoute(id,fit=true){
  const s=layers[id],r=ROUTES.find(x=>x.id===id);
  const card=document.getElementById(`rc-${id}`);
  if(s.visible){
    map.removeLayer(s.out);map.removeLayer(s.poly);
    s.markers.forEach(m=>map.removeLayer(m));
    s.visible=false;activeCount--;card.classList.remove('active');
    showToast(`Ruta ${r.num} ocultada`);
  } else {
    s.out.addTo(map);s.poly.addTo(map);
    s.markers.forEach(m=>m.addTo(map));
    s.visible=true;activeCount++;card.classList.add('active');
    if(fit)map.fitBounds(r.path,{padding:[80,80],maxZoom:15});
    showToast(`Ruta ${r.num} activada ✓`);
  }
  document.getElementById('stat-n').textContent=activeCount;
  if(openId===id)updatePPButtons(r);
}

// ══════════════════════════════════════════════════════
//  POPUP
// ══════════════════════════════════════════════════════
function openPopup(id){
  const r=ROUTES.find(x=>x.id===id);openId=id;
  document.getElementById('pp-badge').textContent=`Ruta ${r.num}`;
  document.getElementById('pp-badge').style.background=r.color;
  document.getElementById('pp-name').textContent=r.name;
  document.getElementById('pp-via').textContent=`${r.desc}\nVía: ${r.via}`;
  document.getElementById('popup').style.setProperty('--rc',r.color);
  document.getElementById('pp-stops').innerHTML=r.stops.map(s=>`
    <div class="pp-stop">
      <div class="pp-sl"><div class="pp-dot"></div><div class="pp-bar"></div></div>
      <div class="pp-sname ${s.terminal?'term':''}">${s.name}</div>
    </div>`).join('');
  updatePPButtons(r);
  document.getElementById('popup').classList.add('show');
  document.getElementById('ov').classList.add('show');
  document.getElementById(`rc-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function updatePPButtons(r){
  const vis=layers[r.id].visible;
  document.getElementById('pp-ti').textContent=vis?'🙈':'👁';
  document.getElementById('pp-tl').textContent=vis?'Ocultar':'Ver en mapa';
  const riding=ridingId===r.id;
  document.getElementById('pp-ride').textContent=riding?'🚏 Bajar del colectivo':'🚌 ¡Subirse a esta ruta!';
  document.getElementById('pp-ride').style.background=riding
    ?'linear-gradient(135deg,#f43f5e,#ec4899)'
    :'linear-gradient(135deg,var(--accent),var(--acb))';
}

function closePopup(){
  document.getElementById('popup').classList.remove('show');
  document.getElementById('ov').classList.remove('show');
  openId=null;
}

document.getElementById('pp-toggle').addEventListener('click',()=>{if(openId)toggleRoute(openId)});
document.getElementById('pp-zoom').addEventListener('click',()=>{
  if(!openId)return;
  const r=ROUTES.find(x=>x.id===openId);
  if(!layers[openId].visible)toggleRoute(openId,false);
  map.fitBounds(r.path,{padding:[80,80],maxZoom:15});
  closePopup();
});
document.getElementById('pp-ride').addEventListener('click',()=>{
  if(openId){
    if(ridingId===openId){stopRiding();}
    else{startRiding(openId);}
  }
});

// ══════════════════════════════════════════════════════
//  RIDING MODE 🚌
// ══════════════════════════════════════════════════════
function startRiding(id){
  if(ridingId){stopRiding(false)}
  const r=ROUTES.find(x=>x.id===id);ridingId=id;ridePathIndex=0;
  if(!layers[id].visible)toggleRoute(id,false);
  // create bus marker
  const busIcon=L.divIcon({className:'',
    html:`<div class="bus-marker-wrap">🚌</div>`,
    iconAnchor:[18,18],iconSize:[36,36]});
  const startPt=r.path[0];
  busMarker=L.marker(startPt,{icon:busIcon,zIndexOffset:1000}).addTo(map);
  map.setView(startPt,15);
  // animate bus along path
  rideInterval=setInterval(()=>{
    ridePathIndex=(ridePathIndex+1)%r.path.length;
    const pt=r.path[ridePathIndex];
    busMarker.setLatLng(pt);
    map.panTo(pt,{animate:true,duration:0.8});
  },2000);
  // banner
  document.getElementById('gps-rname').textContent=`${r.name} · ${r.desc}`;
  document.getElementById('gps-speed').textContent='📍 En movimiento · ~30 km/h';
  document.getElementById('gps-banner').classList.add('show');
  if(openId===id)updatePPButtons(r);
  closePopup();
  showToast('🚌 ¡Subiste a la Ruta '+r.num+'!');
}

function stopRiding(toast=true){
  clearInterval(rideInterval);
  if(busMarker){map.removeLayer(busMarker);busMarker=null}
  const prevId=ridingId;ridingId=null;ridePathIndex=0;
  document.getElementById('gps-banner').classList.remove('show');
  if(prevId&&openId===prevId)updatePPButtons(ROUTES.find(x=>x.id===prevId));
  if(toast)showToast('🚏 Bajaste del colectivo');
}

// ══════════════════════════════════════════════════════
//  ALL ROUTES TOGGLE
// ══════════════════════════════════════════════════════
let plusOn=false;
document.getElementById('nav-plus').addEventListener('click',()=>{
  plusOn=!plusOn;activeCount=0;
  ROUTES.forEach(r=>{
    const s=layers[r.id],c=document.getElementById(`rc-${r.id}`);
    if(plusOn){
      if(!s.visible){s.out.addTo(map);s.poly.addTo(map);s.markers.forEach(m=>m.addTo(map));s.visible=true}
      c.classList.add('active');activeCount++;
    } else {
      if(s.visible){map.removeLayer(s.out);map.removeLayer(s.poly);s.markers.forEach(m=>map.removeLayer(m));s.visible=false}
      c.classList.remove('active');
    }
  });
  document.getElementById('stat-n').textContent=activeCount;
  const btn=document.getElementById('nav-plus');
  btn.style.background=plusOn
    ?'linear-gradient(135deg,#f43f5e,#ec4899)'
    :'linear-gradient(135deg,var(--accent),var(--acb))';
  btn.textContent=plusOn?'✕':'＋';
  if(plusOn){map.fitBounds(ROUTES.flatMap(r=>r.path),{padding:[60,60]});showToast('Todas las rutas visibles')}
  else showToast('Rutas ocultadas');
});

// ══════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════
document.getElementById('s-in').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  document.getElementById('sc').classList.toggle('show',q.length>0);
  document.querySelectorAll('.rc').forEach(c=>c.classList.toggle('hidden',q&&!c.dataset.search.includes(q)));
});
document.getElementById('sc').addEventListener('click',()=>{
  document.getElementById('s-in').value='';
  document.getElementById('sc').classList.remove('show');
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('hidden'));
  document.getElementById('s-in').focus();
});

// ══════════════════════════════════════════════════════
//  FILTER PILLS
// ══════════════════════════════════════════════════════
document.getElementById('pills').addEventListener('click',e=>{
  const p=e.target.closest('.pill');if(!p)return;
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');const z=p.dataset.zone;
  document.querySelectorAll('.rc').forEach(c=>c.classList.toggle('hidden',z!=='all'&&c.dataset.zone!==z));
});

// ══════════════════════════════════════════════════════
//  NAV ITEMS
// ══════════════════════════════════════════════════════
function setupEvents(){
  document.querySelectorAll('.ni').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
      btn.classList.add('active');
      if(btn.dataset.nav==='routes') openRoutesGrid();
    });
  });
}

function openRoutesGrid(){document.getElementById('routes-grid').classList.add('show')}
function closeRoutesGrid(){
  document.getElementById('routes-grid').classList.remove('show');
  const homeBtn=document.querySelector('.ni[data-nav="home"]');
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  if(homeBtn)homeBtn.classList.add('active');
}

// ══════════════════════════════════════════════════════
//  PROFILE
// ══════════════════════════════════════════════════════
function openProfile(){document.getElementById('profile-sheet').classList.add('show')}
function closeProfile(){document.getElementById('profile-sheet').classList.remove('show')}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
let ttimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(ttimer);ttimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// Input enter key
document.getElementById('li-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('rg-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
</script>
